<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>4ham Spectrum Analysis</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <div>
          <p class="kicker">4ham Spectrum Analysis</p>
          <h1>Radio Spectrum Monitor</h1>
          <p class="subtitle">Visualize ocupacao, chamadas e decodificacoes em tempo real.</p>
        </div>
        <div class="controls">
          <label class="control">
            Gain
            <input type="number" id="gain" value="20" />
          </label>
          <label class="control">
            Sample rate
            <input type="number" id="sampleRate" value="48000" />
          </label>
          <label class="control">
            Record path
            <input type="text" id="recordPath" value="data/iq_recording.c64" />
          </label>
          <button class="btn primary" id="startScan">Start scan</button>
          <button class="btn ghost" id="stopScan">Stop</button>
        </div>
      </header>

      <section class="grid">
        <div class="panel">
          <h2>Waterfall</h2>
          <div class="waterfall" id="waterfall">
            <canvas id="waterfallCanvas" width="640" height="240"></canvas>
            <p class="waterfall__status" id="waterfallStatus">Awaiting spectrum stream...</p>
          </div>
        </div>
        <div class="panel">
          <h2>Eventos</h2>
          <ul class="events" id="events"></ul>
        </div>
      </section>

      <section class="panel status">
        <h2>Status</h2>
        <pre id="status">Disconnected</pre>
      </section>

      <section class="panel">
        <h2>Logs</h2>
        <pre id="logs">No logs yet.</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
