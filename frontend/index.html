<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>4ham Spectrum Analysis</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <div>
          <p class="kicker">4ham Spectrum Analysis</p>
          <h1>Radio Spectrum Monitor</h1>
          <p class="subtitle">Visualize ocupacao, chamadas e decodificacoes em tempo real.</p>
        </div>
        <div class="controls">
          <label class="control">
            Gain
            <input type="number" id="gain" value="20" />
          </label>
          <label class="control">
            Sample rate
            <input type="number" id="sampleRate" value="48000" />
          </label>
          <label class="control">
            Record path
            <input type="text" id="recordPath" value="data/iq_recording.c64" />
          </label>
          <button class="btn primary" id="startScan">Start scan</button>
          <button class="btn ghost" id="stopScan">Stop</button>
        </div>
      </header>

      <section class="grid">
        <div class="panel">
          <h2>Waterfall</h2>
          <div class="waterfall" id="waterfall">
            <canvas id="waterfallCanvas" width="640" height="240"></canvas>
            <p class="waterfall__status" id="waterfallStatus">Awaiting spectrum stream...</p>
          </div>
        </div>
        <div class="panel">
          <h2>Eventos</h2>
          <ul class="events" id="events"></ul>
        </div>
      </section>

      <section class="panel status">
        <h2>Status</h2>
        <pre id="status">Disconnected</pre>
      </section>

      <section class="panel">
        <h2>Settings</h2>
        <div class="filters">
          <label class="control">
            Device
            <select id="deviceSelect"></select>
          </label>
          <button class="btn ghost" id="refreshDevices">Refresh devices</button>
          <label class="control">
            Band
            <select id="bandSelect">
              <option value="20m">20m</option>
              <option value="40m">40m</option>
              <option value="2m">2m</option>
              <option value="70cm">70cm</option>
            </select>
          </label>
          <label class="control">
            Auth user
            <input type="text" id="authUser" />
          </label>
          <label class="control">
            Auth pass
            <input type="password" id="authPass" />
          </label>
          <button class="btn ghost" id="saveSettings">Save</button>
        </div>
      </section>

      <section class="panel">
        <h2>Presets</h2>
        <div class="filters">
          <label class="control">
            Preset name
            <input type="text" id="presetName" placeholder="Morning scan" />
          </label>
          <button class="btn ghost" id="savePreset">Save preset</button>
          <button class="btn ghost" id="exportPresets">Export presets</button>
          <label class="control">
            Import presets
            <input type="file" id="importPresets" accept="application/json" />
          </label>
          <select id="presetSelect"></select>
        </div>
      </section>

      <section class="panel">
        <h2>Favorite Bands</h2>
        <div class="filters">
          <select id="favoriteBands"></select>
          <button class="btn ghost" id="addFavorite">Add favorite</button>
          <button class="btn ghost" id="removeFavorite">Remove favorite</button>
        </div>
      </section>

      <div class="toast" id="toast"></div>

      <section class="panel">
        <h2>Bands</h2>
        <div class="filters">
          <label class="control">
            Band name
            <input type="text" id="bandName" value="20m" />
          </label>
          <label class="control">
            Start Hz
            <input type="number" id="bandStart" value="14000000" />
          </label>
          <label class="control">
            End Hz
            <input type="number" id="bandEnd" value="14350000" />
          </label>
          <button class="btn ghost" id="saveBand">Save band</button>
        </div>
      </section>

      <section class="panel">
        <h2>Filters</h2>
        <div class="filters">
          <label class="control">
            Band
            <select id="bandFilter">
              <option value="">All</option>
              <option value="20m">20m</option>
              <option value="40m">40m</option>
              <option value="2m">2m</option>
              <option value="70cm">70cm</option>
            </select>
          </label>
          <label class="control">
            Mode
            <select id="modeFilter">
              <option value="">All</option>
              <option value="FT8">FT8</option>
              <option value="FT4">FT4</option>
              <option value="APRS">APRS</option>
              <option value="CW">CW</option>
              <option value="SSB">SSB</option>
            </select>
          </label>
          <label class="control">
            Callsign
            <input type="text" id="callsignFilter" placeholder="CT1ABC" />
          </label>
          <label class="control">
            Start
            <input type="datetime-local" id="startFilter" />
          </label>
          <label class="control">
            End
            <input type="datetime-local" id="endFilter" />
          </label>
          <button class="btn ghost" id="exportCsv">Export CSV</button>
        </div>
      </section>

      <section class="panel">
        <h2>Logs</h2>
        <pre id="logs">No logs yet.</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
