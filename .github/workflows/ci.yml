name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ============================================
  # Backend Tests (Python)
  # ============================================
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests with coverage
        run: |
          python -m pytest backend/tests/ -v --cov=backend/app --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage

  # ============================================
  # Frontend Tests (JavaScript)
  # ============================================
  frontend-tests:
    name: Frontend Tests (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Run frontend tests
        run: |
          cd frontend
          npm test
  
  # ============================================
  # Code Quality Checks
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black
          pip install -r backend/requirements.txt
      
      - name: Run Ruff (linter)
        run: |
          ruff check backend/app --output-format=github
        continue-on-error: true
      
      - name: Run Black (formatter check)
        run: |
          black --check backend/app
        continue-on-error: true
      
      - name: Run mypy (type checker)
        run: |
          mypy backend/app --ignore-missing-imports
        continue-on-error: true

  # ============================================
  # Security Audit
  # ============================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety
      
      - name: Run pip-audit
        run: |
          pip-audit -r backend/requirements.txt
        continue-on-error: true
      
      - name: Run safety check
        run: |
          safety check -r backend/requirements.txt
        continue-on-error: true

  # ============================================
  # Build and Validate
  # ============================================
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      
      - name: Validate import structure
        run: |
          python -c "from app import main; print('✓ Main module imports successfully')"
        working-directory: backend
      
      - name: Check for syntax errors
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/streaming.py
          python -m py_compile backend/app/scan/engine.py
      
      - name: Validate frontend structure
        run: |
          test -f frontend/index.html || exit 1
          test -f frontend/app.js || exit 1
          test -f frontend/styles.css || exit 1
          test -d frontend/modules || exit 1
          echo "✓ Frontend structure valid"
      
      - name: Build summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ✅ Tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ✅ Tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- Structure: ✅ Validated" >> $GITHUB_STEP_SUMMARY
